# ─────────────────────────────────────────────
# Prefix
# ─────────────────────────────────────────────

unbind C-b              # remove default prefix
set -g prefix C-a       # use backtick as prefix key
bind C-a send-prefix    # press prefix twice to send literal backtick


# ─────────────────────────────────────────────
# Tmux control
# ─────────────────────────────────────────────

bind :        command-prompt                                 # enter tmux command line
bind r        command-prompt "rename-window %%"                # rename current window
bind R        command-prompt "rename-session %%"               # rename current session
bind -n M-r   run-shell "~/.config/tmux/bin/reload"  # reload tmux + ghostty config with Alt-r


# ─────────────────────────────────────────────
# Sessions
# ─────────────────────────────────────────────

bind    d     detach                                         # detach from current session
bind    S     choose-session                                 # interactive session chooser
bind -n M-s   choose-session                                 # same, but without prefix
bind -n M-n   command-prompt -p "New session:" "new-session -A -s '%%'"  # create / attach session
bind    C-r   command-prompt -p "Session name" "run-shell 'tmuxp load -y %%'"  # load tmuxp layout
bind    K     run-shell "~/.config/tmux/bin/kill-clean.sh #{session_name}"     # kill session and clean up


# ─────────────────────────────────────────────
# Windows
# ─────────────────────────────────────────────

bind    X     kill-window                                   # close current window
bind    t     new-window -c "#{pane_current_path}"           # new window in current directory
bind -n M-t   new-window -c "#{pane_current_path}"           # same, but without prefix
bind -n M-1   select-window -t 1
bind -n M-2   select-window -t 2
bind -n M-3   select-window -t 3
bind -n M-4   select-window -t 4
bind -n M-5   select-window -t 5
bind -n M-6   select-window -t 6
bind -n M-7   select-window -t 7
bind -n M-8   select-window -t 8
bind -n M-9   select-window -t 9
bind    w     list-windows                                   # show window list
bind -n 'M-{' swap-window -t -1\; select-window -t -1        # move window left  (no prefix)
bind -n 'M-}' swap-window -t +1\; select-window -t +1        # move window right (no prefix)


# ─────────────────────────────────────────────
# Splits
# ─────────────────────────────────────────────

bind    s     split-window -v -c "#{pane_current_path}"      # horizontal split (below)
bind    v     split-window -h -c "#{pane_current_path}"      # vertical split (right)
bind -n M-D   split-window -v -c "#{pane_current_path}"      # horizontal split without prefix
bind -n M-d   split-window -h -c "#{pane_current_path}"      # vertical split without prefix
unbind '"'
unbind %


# ─────────────────────────────────────────────
# Panes
# ─────────────────────────────────────────────

bind    x     kill-pane                                      # close current pane
bind    b     break-pane                                     # break pane to new window
bind    h     select-pane -L                                 # move left
bind    j     select-pane -D                                 # move down
bind    k     select-pane -U                                 # move up
bind    l     select-pane -R                                 # move right
bind    P     set pane-border-status                         # toggle per-pane title border


# ─────────────────────────────────────────────
# Smart pane navigation (Vim / tmux integration)
# ─────────────────────────────────────────────

is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"


# Normal mode: send C-h/j/k/l to Vim when it is active, otherwise jump tmux panes
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

# Copy mode: same navigation between panes
bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'


# ─────────────────────────────────────────────
# Resize panes
# ─────────────────────────────────────────────

bind z        resize-pane -Z\; refresh-client -S  # toggle zoom for current pane
bind -n 'M-z' resize-pane -Z\; refresh-client -S  # same without prefix
bind -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 3'  # grow/shrink (respecting Vim)
bind -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 3'
bind -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 3'
bind -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 3'


# ─────────────────────────────────────────────
# Layouts
# ─────────────────────────────────────────────

bind -n 'M-=' if-shell "$is_vim" 'send-keys M-=' 'next-layout'  # cycle through pane layouts


# ─────────────────────────────────────────────
# Copy mode (vi-style)
# ─────────────────────────────────────────────

bind-key -n M-[ copy-mode
bind-key -n M-/ copy-mode \; send-keys ?
bind -T copy-mode-vi 'v'   send -X begin-selection           # start visual selection
bind -T copy-mode-vi 'V'   send -X select-line               # select whole line
bind -T copy-mode-vi 'C-v' send -X rectangle-toggle          # toggle block selection
bind -T copy-mode-vi 'y'   send -X copy-selection-and-cancel   # yank to clipboard and exit

# ─────────────────────────────────────────────
# Floating pane toggle
# ─────────────────────────────────────────────

bind    p     run-shell "~/.config/tmux/bin/scratch.sh"        # toggle floating scratch pane (90%)

# ─────────────────────────────────────────────
# Apps
# ─────────────────────────────────────────────

bind -n M-p   display-menu -T "#[align=centre]Apps" -x C -y C \
  "bash"      b  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E bash" \
  "htop"      h  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E htop" \
  "pi"        p  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E pi" \
  "ranger"    r  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E ranger" \
  "sesh"      s  "display-popup -d '#{pane_current_path}' -w 90% -h 50% -E ~/.config/sesh/picker.sh" \
  "tuxedo"    t  "display-popup -d '#{pane_current_path}' -w 90% -h 90% -E tuxedo" \
  "quit"      q  ""
