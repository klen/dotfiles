# ─────────────────────────────────────────────
# External configs
# ─────────────────────────────────────────────

source-file ~/.config/tmux/bind.conf              # key bindings
source-file ~/.config/tmux/theme.conf             # status bar appearance

# ─────────────────────────────────────────────
# General behaviour & performance
# ─────────────────────────────────────────────

# Session options
set -g mouse on                                   # enable mouse support (scroll, select, resize)
set -g detach-on-destroy off                      # switch to another session when the current session is destroyed
set -g history-limit 100000                       # scrollback buffer size (default is 2,000)
set -g repeat-time 1000                          # increase repeat timeout for bound keys

# Server options
set -sg escape-time 0                             # faster command sequences (no delay after Esc)
set -sg focus-events on                           # forward focus events to applications (e.g. Vim)
set -sg extended-keys on                          # enable extended keys for richer key bindings
set -sg set-clipboard on                          # integrate with system clipboard

# Extended keys
%if "#{>=:#{version},3.5}"
set -sg extended-keys-format csi-u
%endif

# %if "#{>=:#{version},3.3}"
# set -g allow-passthrough on                       # allow terminal escape-sequence passthrough
# %endif

# ─────────────────────────────────────────────
# Windows
# ─────────────────────────────────────────────

set -g base-index 1                               # start window numbering at 1 instead of 0
set -g renumber-windows on                        # renumber remaining windows after one is closed

set -wg automatic-rename on                       # auto-rename window to the current program
set -wg automatic-rename-format "#{b:pane_current_path}" # show only directory name as title

# ─────────────────────────────────────────────
# Panes
# ─────────────────────────────────────────────

set -wg pane-base-index 1                         # start pane numbering at 1 (consistent with windows)
set -wg pane-border-lines single                  # simple single-line pane borders


# ─────────────────────────────────────────────
# Display
# ─────────────────────────────────────────────

set -g set-titles on                              # update the host terminal title
set -g display-time 1000                          # how long status messages stay visible (ms)
set -g display-panes-time 800                     # how long pane numbers stay visible (ms)

# ─────────────────────────────────────────────
# Copy mode
# ─────────────────────────────────────────────

set -wg mode-keys vi                              # vi-style key bindings in copy mode
set -wg mode-style 'fg=#1F1F28,bg=#7E9CD8'        # copy mode highlight colour

# ─────────────────────────────────────────────
# Notifications
# ─────────────────────────────────────────────

set -g monitor-bell on                            # watch for terminal bell in other windows
set -g bell-action other                          # ring bell only for windows other than current

set -g visual-bell off                            # do not show a visual bell indicator
set -g visual-silence off                         # do not show visual silence indicator
set -g visual-activity off                        # do not show visual activity indicator
set -g monitor-activity off                       # do not monitor activity in other windows
