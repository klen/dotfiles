# ─────────────────────────────────────────────
# Panes
# ─────────────────────────────────────────────

set -wg pane-border-style 'fg=#3a3a3a'            # inactive pane border colour
set -wg pane-active-border-style 'fg=#5f8787'     # active pane border colour

# ─────────────────────────────────────────────
# Notifications
# ─────────────────────────────────────────────

set -wg window-status-bell-style 'fg=#ff6c6b,bg=#1f1f28,bright'  # style for windows with bell

# ─────────────────────────────────────────────
# Status bar position & refresh
# ─────────────────────────────────────────────

# Top bar locally, bottom bar when inside SSH
if-shell "[ -n \"$SSH_TTY\" ]" "set -g status-position bottom" "set -g status-position top"
set -g status-interval 10    # redraw status line every 10 seconds


# ─────────────────────────────────────────────
# Colours
# ─────────────────────────────────────────────

set -g status-fg white
# Darker background locally, slightly brighter when inside SSH
if-shell "[ -n \"$SSH_TTY\" ]" "set -g status-bg colour24" "set -g status-bg colour235"


# ─────────────────────────────────────────────
# Window list in status bar
# ─────────────────────────────────────────────

setw -g window-status-separator ''
setw -g window-status-style 'bg=default,fg=grey'
setw -g window-status-format '  #I:#W #F '

setw -g window-status-current-style 'bg=default,fg=white,bold'
setw -g window-status-current-format '  #I:#W #F '


# ─────────────────────────────────────────────
# Left status (session name + prefix indicator)
# ─────────────────────────────────────────────

set -g status-left-length 30
set -g status-left "#[fg=grey,bold]#{?client_prefix,#[fg=colour231]#[bg=colour04] prefix ,#{?pane_in_mode,#[default]#[fg=default]#[bg=yellow] copy ,#{?synchronize-panes,#[default]#[fg=default]#[bg=yellow] sync ,#[default]#[fg=default]#[bg=default]}}}#[default] #S #[default]"


# ─────────────────────────────────────────────
# Right status (git + sysinfo + user@host)
# ─────────────────────────────────────────────

set -g status-right-length 100
set -g status-right '#[fg=grey]#(~/.config/tmux/bin/git.sh #{pane_current_path})#(~/.config/tmux/bin/sysinfo.sh) | #(~/.config/tmux/bin/ssh-host.sh)'
