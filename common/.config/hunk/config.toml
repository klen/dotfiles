theme = "custom"               # any built-in theme id, auto, or custom
mode = "stack"                 # auto, split, stack
vcs = "git"                    # git, jj, sl
watch = false
exclude_untracked = false
line_numbers = true
wrap_lines = false
agent_notes = false
transparent_background = false

[custom_theme]
base = "graphite"
label = "covid19"
background = "#121212"
panel = "#1c1c1c"
panelAlt = "#262626"
border = "#3a3a3a"
accent = "#ffa460"
accentMuted = "#4d3626"
text = "#c7c7c7"
muted = "#606060"
addedBg = "#1e2a1e"
removedBg = "#301e1e"
movedAddedBg = "#362b1e"
movedRemovedBg = "#362b1e"
contextBg = "#121212"
addedContentBg = "#253925"
removedContentBg = "#432525"
contextContentBg = "#121212"
addedSignColor = "#5faf5f"
removedSignColor = "#d75f5f"
lineNumberBg = "#121212"
lineNumberFg = "#606060"
selectedHunk = "#4d3626"
badgeAdded = "#5faf5f"
badgeRemoved = "#d75f5f"
badgeNeutral = "#606060"
fileNew = "#5faf5f"
fileDeleted = "#d75f5f"
fileRenamed = "#87afd7"
fileModified = "#ffb964"
fileUntracked = "#878787"
noteBorder = "#ffa460"
noteBackground = "#1c1c1c"
noteTitleBackground = "#262626"
noteTitleText = "#c7c7c7"

[custom_theme.syntax]
default = "#c7c7c7"
keyword = "#8787af"
string = "#87af5f"
