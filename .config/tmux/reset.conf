# ─────────────────────────────────────────────
# Reset & defaults
# ─────────────────────────────────────────────

# Uncomment to wipe ALL keybindings before redefining them
# unbind-key -a

# Re-insert / override select tmux default bindings
bind ^X lock-server           # lock the server (prefix + Ctrl-x)
bind * list-clients           # list attached clients (prefix + *)
bind '"' choose-window        # interactive window chooser (prefix + ")
bind * setw synchronize-panes # toggle input synchronization across panes
bind K send-keys "clear"\; send-keys "Enter"  # clear the current pane

# Copy mode: start selection with v
bind-key -T copy-mode-vi v send-keys -X begin-selection
