---
- hosts: all

  vars_files:
    - vars.yml
    - vars.server.apps.yml

  pre_tasks:
    - name: Ensure Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false

    - name: Ensure Docker Compose plugin is available
      ansible.builtin.command: docker compose version
      changed_when: false

    - name: Check Docker daemon availability
      ansible.builtin.command: docker info
      register: docker_info
      changed_when: false
      failed_when: false

    - name: Fail when Docker daemon is not running
      ansible.builtin.fail:
        msg: >-
          Docker daemon is not running or unreachable.
          Start OrbStack/Docker Desktop and retry `make apps`.
          Details: {{ docker_info.stderr | default('docker info failed') }}
      when: docker_info.rc != 0

  tasks:
    - name: Ensure app data directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ apps_stack_dir }}", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/caddy/data", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/caddy/config", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/jellyfin/config", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/jellyfin/cache", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/nextcloud/html", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/postgres/data", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/redis/data", mode: "0755" }
        - {
            path: "{{ apps_home }}/.local/share/qbittorrent/config",
            mode: "0755",
          }
        - { path: "{{ apps_home }}/.local/share/prowlarr/config", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/sonarr/config", mode: "0755" }
        - { path: "{{ apps_home }}/.local/share/radarr/config", mode: "0755" }
        - { path: "{{ nextcloud_data_dir }}", mode: "0770" }
        - { path: "{{ media_movies_dir }}", mode: "0755" }
        - { path: "{{ media_tv_dir }}", mode: "0755" }
        - { path: "{{ media_downloads_dir }}", mode: "0755" }

    - name: Render Docker Compose file
      ansible.builtin.template:
        src: templates/server.apps.compose.yml.j2
        dest: "{{ apps_stack_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Render Caddyfile
      ansible.builtin.template:
        src: templates/server.apps.Caddyfile.j2
        dest: "{{ apps_stack_dir }}/Caddyfile"
        mode: "0644"

    - name: Start app stack
      ansible.builtin.command: docker compose up -d
      args:
        chdir: "{{ apps_stack_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stdout or 'Recreated' in compose_up.stdout or 'Created' in compose_up.stdout"

    - name: Wait for Sonarr config file
      ansible.builtin.wait_for:
        path: "{{ apps_home }}/.local/share/sonarr/config/config.xml"
        timeout: 60

    - name: Set Sonarr URL base
      ansible.builtin.lineinfile:
        path: "{{ apps_home }}/.local/share/sonarr/config/config.xml"
        regexp: '^\s*<UrlBase>.*</UrlBase>\s*$'
        line: "  <UrlBase>{{ sonarr_url_base }}</UrlBase>"
        insertbefore: '^\s*</Config>\s*$'
      register: sonarr_url_base_config

    - name: Restart Sonarr when URL base changes
      ansible.builtin.command: docker compose restart sonarr
      args:
        chdir: "{{ apps_stack_dir }}"
      changed_when: true
      when: sonarr_url_base_config.changed

    - name: Wait for Radarr config file
      ansible.builtin.wait_for:
        path: "{{ apps_home }}/.local/share/radarr/config/config.xml"
        timeout: 60

    - name: Set Radarr URL base
      ansible.builtin.lineinfile:
        path: "{{ apps_home }}/.local/share/radarr/config/config.xml"
        regexp: '^\s*<UrlBase>.*</UrlBase>\s*$'
        line: "  <UrlBase>{{ radarr_url_base }}</UrlBase>"
        insertbefore: '^\s*</Config>\s*$'
      register: radarr_url_base_config

    - name: Restart Radarr when URL base changes
      ansible.builtin.command: docker compose restart radarr
      args:
        chdir: "{{ apps_stack_dir }}"
      changed_when: true
      when: radarr_url_base_config.changed

    - name: Wait for Prowlarr config file
      ansible.builtin.wait_for:
        path: "{{ apps_home }}/.local/share/prowlarr/config/config.xml"
        timeout: 60

    - name: Set Prowlarr URL base
      ansible.builtin.lineinfile:
        path: "{{ apps_home }}/.local/share/prowlarr/config/config.xml"
        regexp: '^\s*<UrlBase>.*</UrlBase>\s*$'
        line: "  <UrlBase>{{ prowlarr_url_base }}</UrlBase>"
        insertbefore: '^\s*</Config>\s*$'
      register: prowlarr_url_base_config

    - name: Restart Prowlarr when URL base changes
      ansible.builtin.command: docker compose restart prowlarr
      args:
        chdir: "{{ apps_stack_dir }}"
      changed_when: true
      when: prowlarr_url_base_config.changed
