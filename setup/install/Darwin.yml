---
- name: Update homebrew
  homebrew:
    update_homebrew: true

- name: Install setup utils
  homebrew:
    name:
      - cowsay
      - fortune
      - stow

- name: Install terminal utils
  homebrew:
    name:
      - tmux
      - tmuxp
      - bash # shell
      - bash-completion # shell-completion
      - coreutils
      - pass
      - ripgrep # Search tool like grep and The Silver Searcher
      - fd # Simple, fast and user-friendly alternative to find
      - television # General purpose fuzzy finder TUI
      - terminal-notifier

- name: Install editors
  homebrew:
    name:
      - vim
      - neovim

- name: Install languages / packages
  homebrew:
    name:
      - golang
      - tcl-tk # Required by pyenv
      - pyenv # Python versions manager
      - nodenv # Node versions manager
      - luarocks # Lua package/versions manager
      - uv
      - rust

- name: Install other tools
  homebrew:
    name:
      - fzf
      - git-flow
      - htop-osx
      - httpie
      - mplayer
      - mpv
      - rsc_2fa
      - unzip
      - wget
      - copyparty
